<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code do Checklist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f8;
        }
        .qrcode-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }
        .qrcode-card {
            width: 100%;
            max-width: 720px;
            background: #fff;
            border: 1px solid #dde3ea;
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            padding: 40px;
            text-align: center;
        }
        .qrcode-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .qrcode-machine {
            font-size: 1.15rem;
            color: #334155;
            margin-bottom: 28px;
        }
        .qrcode-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 24px;
            border: 1px solid #dbe2ea;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        .qrcode-link {
            word-break: break-all;
            color: #475569;
            font-size: 0.95rem;
        }
        @media print {
            body {
                background: #fff;
            }
            .qrcode-card {
                box-shadow: none;
                border-color: #cbd5e1;
            }
        }
    </style>
</head>
<body>
    <div class="qrcode-shell">
        <div class="qrcode-card">
            <div class="qrcode-title">Manutenção Autônoma</div>
            <div class="qrcode-machine">{{ formulario.maquina.codigo }}{% if formulario.maquina.descricao %} - {{ formulario.maquina.descricao }}{% endif %}</div>
            <div class="qrcode-box">
                <div id="qrcode"></div>
            </div>
            <div class="qrcode-link">{{ public_url }}</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "{{ public_url|escapejs }}",
            width: 280,
            height: 280,
            colorDark: "#111827",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
