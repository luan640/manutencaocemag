{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist enviado</title>
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-body text-center p-5">
                        <h3 class="mb-3">Checklist enviado com sucesso</h3>
                        <p class="text-muted mb-2">
                            Formulario: <strong>{{ formulario.titulo }}</strong>
                        </p>
                        <p class="text-muted mb-4">
                            Registro em {{ data_registro|date:"d/m/Y" }}.
                        </p>
                        <a href="javascript:window.location.reload();" class="btn btn-outline-primary">Novo envio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
