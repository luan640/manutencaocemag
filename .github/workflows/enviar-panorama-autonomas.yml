name: Enviar Panorama Autonomas

on:
  schedule:
    # 02:00 America/Sao_Paulo = 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Data no formato YYYY-MM-DD; deixe em branco para usar o dia anterior no servidor"
        required: false
        type: string
      dry_run:
        description: "Executar sem enviar e-mail"
        required: false
        default: false
        type: boolean

concurrency:
  group: enviar-panorama-autonomas
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validar segredo obrigatorio
        env:
          JOB_TOKEN: ${{ secrets.INTERNAL_JOB_TOKEN }}
        run: |
          test -n "$JOB_TOKEN" || { echo "Secret INTERNAL_JOB_TOKEN nao configurado."; exit 1; }

      - name: Montar URL da execucao
        id: build_url
        shell: bash
        env:
          REPORT_DATE: ${{ github.event.inputs.report_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          URL="https://www.manutencaocemag.com.br/internal/jobs/enviar-panorama-autonomas/"
          EFFECTIVE_REPORT_DATE="$REPORT_DATE"

          if [ -z "$EFFECTIVE_REPORT_DATE" ]; then
            EFFECTIVE_REPORT_DATE=$(TZ=America/Sao_Paulo date -d "yesterday" +%F)
          fi

          URL="${URL}?date=${EFFECTIVE_REPORT_DATE}"
          HAS_QUERY=1

          if [ "$DRY_RUN" = "true" ]; then
            if [ "$HAS_QUERY" = "1" ]; then
              URL="${URL}&dry_run=true"
            else
              URL="${URL}?dry_run=true"
            fi
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Disparar job no Render
        shell: bash
        env:
          JOB_URL: ${{ steps.build_url.outputs.url }}
          JOB_TOKEN: ${{ secrets.INTERNAL_JOB_TOKEN }}
        run: |
          RESPONSE=$(curl --fail --show-error --silent --location \
            --request POST \
            --header "X-Job-Token: $JOB_TOKEN" \
            --header "Accept: application/json" \
            "$JOB_URL")
          echo "$RESPONSE"
